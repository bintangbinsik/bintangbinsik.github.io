<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Server @binsik.exe</title>
    <style>
        :root {
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --border: #334155;
            --whatsapp-color: #25d366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Container Utama */
        .main-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 40px 24px;
            background-color: #111827;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        @media (min-width: 1024px) {
            .main-container {
                max-width: 500px;
                padding: 50px 40px;
            }
        }

        /* Desain Tulisan Atas / Judul */
        .title-area {
            margin-bottom: 35px;
        }

        .title-area h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        .title-area p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Area Tombol Model Pilihan Halaman */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .gallery-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 20px;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .gallery-btn:hover, .gallery-btn:active {
            background-color: var(--primary);
            border-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        /* Tulisan Tambahan Di Atas Tombol WhatsApp (Dibuat mengambang/tipis di area bawah atau di atas footer bawaan) */
        .info-text-bottom {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 40px;
            letter-spacing: 0.05em;
        }

        /* Tombol Melayang WhatsApp Pojok Kanan Bawah (Ukuran Medium) */
        .whatsapp-floating {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background-color: var(--whatsapp-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 999;
            text-decoration: none;
        }

        .whatsapp-floating:hover, .whatsapp-floating:active {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6);
        }

        /* SVG Logo WhatsApp Resmi */
        .whatsapp-floating svg {
            width: 30px;
            height: 30px;
            fill: #ffffff;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="title-area">
            <h1>XII4</h1>
            <p>Pilih halaman galeri yang ingin Anda akses</p>
        </div>

        <div class="button-group">
            <a href="https://bintangbinsik.github.io/Fotopages" class="gallery-btn">
                <span>📂</span> Galeri Foto Utama (Halaman 1)
            </a>
            
            <a href="https://bintangbinsik.github.io/Fotopages1" class="gallery-btn">
                <span>📂</span> Galeri Foto Tambahan (Halaman 2)
            </a>
        </div>

        <div class="info-text-bottom">
            Sistem Web Terintegrasi online, oleh hosting 🔥
        </div>
    </div>
